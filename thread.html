<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>boofbrain — Thread</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="content-wrapper">
    <div id="thread-container" class="feature-card">
      <h1 id="thread-title">Conversation</h1>
      <div id="thread-messages" style="max-height:60vh; overflow-y:auto; margin-bottom:1rem;"></div>
      <form id="thread-form" class="compose-form">
        <textarea id="thread-input" rows="2" maxlength="500" required placeholder="Type…"></textarea>
        <button type="submit" class="submit-button">Send</button>
      </form>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="js/main.js"></script>
  <script src="js/thread.js"></script>
</body>
</html>
