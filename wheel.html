<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>boofbrain — Decision Wheel</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .wheel-page-container {
      text-align: center;
      padding: calc(var(--spacing) * 2) var(--spacing);
    }
    .wheel-title {
      font-family: var(--font-brand);
      color: var(--color-secondary);
      margin-bottom: var(--spacing);
    }
    .wheel-description {
      color: var(--color-text-muted);
      margin-bottom: calc(var(--spacing) * 2);
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
    .wheel-container {
      position: relative;
      width: 350px; /* Size of the wheel */
      height: 350px;
      margin: calc(var(--spacing) * 2) auto;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 5px solid var(--color-text);
      position: relative;
      overflow: hidden; /* Important for labels */
      transition: transform 5s cubic-bezier(0.25, 1, 0.5, 1); /* From js/wheel.js */
    }
    .wheel-pointer {
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 30px solid var(--color-accent); /* Pointer color */
      position: absolute;
      top: -15px; /* Position above the center, adjust as needed */
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }
    /* Styling for labels within the wheel from js/wheel.js */
    .wheel-label-container {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        /* transform-origin set by JS based on index */
    }
    .wheel-label {
        position: absolute;
        top: 10%; /* How far from the center the text starts */
        left: 50%;
        transform-origin: center left; /* Rotate around the center of the wheel */
        /* text rotation set by JS */
        font-size: 0.8rem;
        font-weight: bold;
        color: var(--color-white);
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        white-space: nowrap;
    }

    #spin-btn {
      font-family: var(--font-tagline);
      background: var(--color-primary);
      color: var(--color-white);
      border: none;
      border-radius: var(--radius);
      padding: var(--spacing) calc(var(--spacing) * 2);
      font-size: 1.5rem;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
      margin-top: var(--spacing);
    }
    #spin-btn:hover:not(:disabled) {
      background: var(--color-secondary);
      transform: translateY(-3px);
    }
    #spin-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    #result-container {
      margin-top: calc(var(--spacing) * 2);
      font-size: 1.5rem;
      font-weight: bold;
      min-height: 2em; /* Prevent layout jumps */
    }
    .winner-text { /* Class used by JS */
        /* color will be set by JS */
        padding: 0.2em 0.4em;
        border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- HEADER INJECTION POINT -->
  <div id="header-placeholder"></div>

  <main class="content-wrapper wheel-page-container">
    <h1 class="wheel-title">What Should I Eat?</h1>
    <p class="wheel-description">
      Can't decide what to eat? Let the Wheel of Destiny make the choice for you!
      Give it a spin and embrace your culinary fate.
    </p>

    <div class="wheel-container">
      <div class="wheel-pointer"></div>
      <div id="wheel">
        <!-- Segments and labels will be generated by js/wheel.js -->
      </div>
    </div>

    <button id="spin-btn">Spin the Wheel!</button>
    <div id="result-container">
      <!-- Result will be displayed here -->
    </div>
  </main>

  <!-- FOOTER INJECTION POINT -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <script src="js/wheel.js"></script>
</body>
</html>
