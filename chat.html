<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>boofbrain Chat</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Chat-specific styles have been moved to css/style.css -->
</head>
<body>
  <!-- HEADER INJECTION POINT -->
  <div id="header-placeholder"></div>

  <main class="chat-container">
    <div class="messages" id="messages"></div>
    <form id="chatForm" class="chat-form" autocomplete="off">
      <input id="messageInput" type="text" placeholder="Type your message…" required maxlength="500" />
      <button type="submit">Send</button>
    </form>
  </main>

  <!-- FOOTER INJECTION POINT -->
  <div id="footer-placeholder"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/main.js"></script>    <!-- header/footer & auth logic -->
  <script src="js/chat.js"></script>    <!-- chat client logic -->
</body>
</html>
