<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>boofbrain — Can it run DOOM?</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- js-dos style sheet -->
  <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <!-- Doom-specific styles moved to css/style.css -->
</head>
<body class="doom-page">
  <!-- HEADER INJECTION POINT -->
  <div id="header-placeholder"></div>

  <main class="content-wrapper content-container">
    <h1 class="section-title">CAN IT RUN DOOM?</h1>

    <div id="jsdos-container">
      <p style="text-align:center; padding-top: 20px; color: #ffcc00;">LOADING DOOM...</p>
    </div>

    <a href="community.html" class="back-link">BACK TO REALITY</a>
  </main>

  <!-- FOOTER INJECTION POINT -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <!-- js-dos -->
  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <script>
    const jsdosContainer = document.getElementById("jsdos-container");
    if (jsdosContainer) {
      Dos(jsdosContainer, {
        url: "doom.jsdos", // Ensure doom.jsdos is in the same directory or provide correct path
        // Optional: you can specify an 'onprogress' handler to update loading status
        // onprogress: (stage, total, loaded) => {
        //   console.log('Loading... stage: ' + stage + ', loaded: ' + loaded + '/' + total);
        //   jsdosContainer.innerHTML = `<p>Loading ${stage}: ${ Math.round(loaded/total * 100) }%</p>`;
        // }
      }).then(ci => {
        console.log("js-dos instance started with bundle: doom.jsdos");
        // Optionally hide any custom loading message if the canvas is now active
        // jsdosContainer.innerHTML = ""; // Clear loading message if needed, but js-dos usually takes over the div
      }).catch(error => {
        console.error("Error starting js-dos:", error);
        if (jsdosContainer) {
          jsdosContainer.innerHTML = "<p style='color:red; text-align:center; padding-top: 20px;'>Could not load Doom. Please ensure 'doom.jsdos' is present and valid. Check console for details.</p>";
        }
      });
    } else {
      console.error("Could not find the jsdos-container element.");
    }
  </script>
</body>
</html>
