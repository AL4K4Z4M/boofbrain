<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>boofbrain — Can it run DOOM?</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- js-dos style sheet -->
  <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
  <style>
    .content-container {
      text-align: center;
      padding: calc(var(--spacing) * 2) var(--spacing);
      /* min-height: 50vh; Removed for js-dos container */
      /* display: flex; Removed for js-dos container */
      /* flex-direction: column; Removed for js-dos container */
      /* justify-content: center; Removed for js-dos container */
      /* align-items: center; Removed for js-dos container */
    }
    /* Removed .doom-answer and .doom-subtext as they are no longer used */
    .back-link {
      display: inline-block;
      margin-top: calc(var(--spacing) * 2);
      padding: var(--spacing);
      background-color: var(--color-primary);
      color: var(--color-white);
      text-decoration: none;
      border-radius: var(--radius);
      font-family: var(--font-tagline);
      transition: background-color var(--transition);
    }
    .back-link:hover {
      background-color: var(--color-secondary);
    }
    #jsdos-container { /* Style for the js-dos container itself */
        width: 640px; /* Default DOS width */
        height: 400px; /* Default DOS height */
        margin: 0 auto var(--spacing); /* Center it and add some bottom margin */
    }
  </style>
</head>
<body>
  <!-- HEADER INJECTION POINT -->
  <div id="header-placeholder"></div>

  <main class="content-wrapper content-container">
    <h1 class="section-title">The Eternal Question: Can it run DOOM?</h1>

    <div id="jsdos-container">
      <p style="text-align:center; padding-top: 20px;">Loading DOOM...</p>
    </div>

    <a href="community.html" class="back-link">Back to Community</a>
  </main>

  <!-- FOOTER INJECTION POINT -->
  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
  <!-- js-dos -->
  <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
  <script>
    const jsdosContainer = document.getElementById("jsdos-container");
    if (jsdosContainer) {
      Dos(jsdosContainer, {
        url: "doom.jsdos", // Ensure doom.jsdos is in the same directory or provide correct path
        // Optional: you can specify an 'onprogress' handler to update loading status
        // onprogress: (stage, total, loaded) => {
        //   console.log('Loading... stage: ' + stage + ', loaded: ' + loaded + '/' + total);
        //   jsdosContainer.innerHTML = `<p>Loading ${stage}: ${ Math.round(loaded/total * 100) }%</p>`;
        // }
      }).then(ci => {
        console.log("js-dos instance started with bundle: doom.jsdos");
        // Optionally hide any custom loading message if the canvas is now active
        // jsdosContainer.innerHTML = ""; // Clear loading message if needed, but js-dos usually takes over the div
      }).catch(error => {
        console.error("Error starting js-dos:", error);
        if (jsdosContainer) {
          jsdosContainer.innerHTML = "<p style='color:red; text-align:center; padding-top: 20px;'>Could not load Doom. Please ensure 'doom.jsdos' is present and valid. Check console for details.</p>";
        }
      });
    } else {
      console.error("Could not find the jsdos-container element.");
    }
  </script>
</body>
</html>
